<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
</head>
<body>
<h2>Вход в систему</h2>
<form th:action="@{/login}" method="post">
    <div>
        <label for="username">Имя пользователя:</label>
        <input type="text" id="username" name="username" required />
    </div>
    <div>
        <label for="password">Пароль:</label>
        <input type="password" id="password" name="password" required />
    </div>
    <div>
        <button type="submit">Войти</button>
    </div>
    <div th:if="${param.error}" style="color:red;">Неверное имя пользователя или пароль</div>
    <div th:if="${param.logout}" style="color:green;">Вы успешно вышли</div>
    <div th:if="${param.registered}" style="color:green;">Регистрация прошла успешно, теперь войдите</div>
</form>
<p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
</body>
</html>
